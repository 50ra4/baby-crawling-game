name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# lint/型チェック/テスト/ビルドのみ。依存パッケージのコード（npm ci の postinstall・
# Vite プラグイン）に書き込みトークンを渡さないよう最小権限へ固定する（deploy.yml /
# pr-preview.yml の build ジョブと同じハードニング）。
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type Check
        run: npx tsc -b

      - name: Test
        run: npm run test:run

      - name: Build
        run: npx vite build --base /baby-crawling-game/
